repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        files: '^plugins/.*/bin/[^/]+$'
        args: [-s, sh]

  - repo: local
    hooks:
      - id: namespace-gate
        name: No legacy AUTOSRE_ env vars in scripts/
        entry: bash -c 'if grep -rn "AUTOSRE_" plugins/*/scripts/; then echo "FAIL"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: hook-command-quotes-root
        name: hooks.json must quote ${CLAUDE_PLUGIN_ROOT}
        entry: bash -c 'for f in plugins/*/hooks/hooks.json; do grep -q "\"\${CLAUDE_PLUGIN_ROOT}/" "$f" || { echo "FAIL: $f"; exit 1; }; done'
        language: system
        pass_filenames: false
