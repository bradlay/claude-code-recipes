# Tooling-only pyproject.toml. There is no installable package here;
# this exists so ruff, mypy, and editors pick up consistent settings.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific
    "PL",     # pylint
    "PTH",    # flake8-use-pathlib
    "S",      # flake8-bandit (security)
]
ignore = [
    "PLR0911",  # too many returns; the hook's branchy decision flow is fine
    "PLR0912",  # too many branches; same reason
    "PLR0913",  # too many args; chain.py's _save_cycle_log is fine
    "PLR0915",  # too many statements
    "PLR2004",  # magic value comparisons
    "S101",    # asserts (we don't use them anyway, but keep flexibility)
    "S603",    # subprocess without shell=False; we always set check=False explicitly
]

[tool.ruff.lint.per-file-ignores]
"plugins/plan-review-loop/scripts/_lib/_io.py" = [
    "S110",  # try/except/pass on log writes; logging must never raise
]
"plugins/plan-review-loop/scripts/_lib/runner.py" = [
    # Prompt strings are byte-identical to the upstream auto-sre review
    # prompts. Reflowing them changes the text sent to the reviewer, which
    # changes review behavior; keep the long lines.
    "E501",
]
"tests/*" = [
    "SLF001",   # tests poke at _private helpers on purpose
    "S101",     # assert is the test idiom
    "PLR2004",  # magic literal comparisons in assertions
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q --strict-markers"

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
# Each plugin has its own scripts/_lib/ tree. Both directories define a
# top-level package called `_lib`, so mypy can't check them in a single
# invocation. CI runs mypy once per plugin (see .github/workflows/ci.yml);
# the local default below points at plan-review-loop. Override with
# MYPYPATH or explicit args to check a different plugin.
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
ignore_missing_imports = true
mypy_path = ["plugins/plan-review-loop/scripts"]
explicit_package_bases = true
